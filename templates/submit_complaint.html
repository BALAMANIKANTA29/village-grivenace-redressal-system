{% extends "base.html" %}

{% block title %}Submit Grievance - GPGMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0 text-center"><i class="fas fa-file-alt me-2"></i>Raise a New Grievance</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <h5 class="mb-3 text-secondary">Grievance Details</h5>
                    <div class="mb-3">
                        <label for="category" class="form-label">Grievance Category <span class="text-danger">*</span></label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="Public Services">Public Services</option>
                            <option value="Infrastructure & Development">Infrastructure & Development</option>
                            <option value="Health & Medical Services">Health & Medical Services</option>
                            <option value="Education">Education</option>
                            <option value="Revenue & Land">Revenue & Land</option>
                            <option value="Law & Order / Public Safety">Law & Order / Public Safety</option>
                            <option value="Employment & Welfare Schemes">Employment & Welfare Schemes</option>
                            <option value="Banking & Financial Services">Banking & Financial Services</option>
                            <option value="Social Welfare">Social Welfare</option>
                            <option value="Housing & Urban Development">Housing & Urban Development</option>
                            <option value="Agriculture & Environment">Agriculture & Environment</option>
                            <option value="Transport">Transport</option>
                            <option value="Documentation & Certificates">Documentation & Certificates</option>
                            <option value="Others">Others</option>
                        </select>
                        <div class="form-text">The system will automatically route your grievance to the concerned department.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Detailed Description <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="description" name="description" rows="5" required placeholder="Describe your grievance in detail..."></textarea>
                    </div>

                    <h5 class="mb-3 mt-4 text-secondary">Location Details</h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="district" class="form-label">District <span class="text-danger">*</span></label>
                            <select class="form-select" id="district" name="district" required>
                                <option value="">Select District</option>
                                <option value="Visakhapatnam">Visakhapatnam</option>
                                <option value="Krishna">Krishna</option>
                                <option value="Guntur">Guntur</option>
                                <option value="Chittoor">Chittoor</option>
                                <option value="East Godavari">East Godavari</option>
                                <option value="West Godavari">West Godavari</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="mandal" class="form-label">Mandal <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="mandal" name="mandal" required placeholder="Enter Mandal">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ward" class="form-label">Ward / Village</label>
                            <input type="text" class="form-control" id="ward" name="ward" placeholder="Enter Ward No.">
                        </div>
                    </div>

                    <div class="mb-3 mt-3">
                        <label for="photo" class="form-label">Supporting Document/Photo (Optional)</label>
                        <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Grievance</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
